<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="color-scheme" content="dark">
  <title>The Horological Atlas</title>
  <link rel="stylesheet" href="app.css?v=16">
</head>
<body class="pre-reveal">

  <canvas id="atlas" aria-label="The Horological Atlas — an interactive map of dive-watch design history"></canvas>

  <div id="status" hidden>
    <p id="status-1"></p>
    <p id="status-2"></p>
  </div>

  <header id="wordmark" class="chrome">THE HOROLOGICAL ATLAS
    <span id="tagline">A map of dive-watch design, arranged by kinship — brightness is influence.</span>
  </header>

  <nav id="mode-toggle" class="chrome" aria-label="Projection">
    <button id="mt-sky" type="button" aria-pressed="true">SKY</button>
    <span class="mt-dot" aria-hidden="true">&middot;</span>
    <button id="mt-descent" type="button" aria-pressed="false">DESCENT</button>
  </nav>

  <div id="search" class="chrome">
    <button id="search-toggle" type="button">Search <span class="kbd">⌘K</span></button>
    <input id="search-input" type="text" role="combobox" aria-expanded="false"
           aria-controls="search-results" aria-autocomplete="list" aria-label="Search watches and families"
           autocomplete="off" autocapitalize="off" spellcheck="false" hidden>
    <ul id="search-results" role="listbox" aria-label="Watches and families" hidden></ul>
  </div>

  <aside id="panel" role="dialog" aria-label="Watch detail" tabindex="-1" hidden>
    <button id="panel-close" type="button" aria-label="Close">
      <svg width="8" height="8" viewBox="0 0 8 8" aria-hidden="true">
        <path d="M0.5 0.5 L7.5 7.5 M7.5 0.5 L0.5 7.5" stroke="currentColor" stroke-width="1" fill="none"/>
      </svg>
    </button>
    <div id="panel-content"></div>
  </aside>

  <div id="timeline" class="chrome at-now" hidden>
    <button id="tl-play" type="button" aria-label="Play the century" title="Play the century (Space)" aria-keyshortcuts="Space">
      <svg width="9" height="10" viewBox="0 0 9 10" aria-hidden="true"><path d="M1 0.8 L8.2 5 L1 9.2 Z" fill="currentColor"/></svg>
    </button>
    <div id="tl-track" role="slider" tabindex="0" aria-label="Year — the field as it existed"
         aria-valuemin="1930" aria-valuemax="2026" aria-valuenow="2026">
      <canvas id="tl-ruler" aria-hidden="true"></canvas>
      <div id="tl-thumb"><span id="tl-readout"></span></div>
    </div>
    <button id="tl-now" type="button" aria-label="Return to the present">NOW</button>
  </div>

  <footer class="chrome">
    <div id="footer-left"></div>
    <div id="footer-right">
      <span id="key-legend">D descend&thinsp;&middot;&thinsp;H hide&thinsp;&middot;&thinsp;E export&thinsp;&middot;&thinsp;Space play&thinsp;&middot;&thinsp;F fit</span>
      <button id="lens-chip" type="button" aria-expanded="false" aria-controls="lens-panel">LENS</button>
      <button id="fit-chip" type="button" title="Fit the whole field (F)" aria-keyshortcuts="F">FIT</button>
    </div>
  </footer>

  <div id="sounding" role="slider" tabindex="0" aria-orientation="vertical"
       aria-label="Sounding line — dive to a depth" aria-valuemin="0" aria-valuemax="143" aria-valuenow="0" hidden>
    <canvas id="snd-canvas" aria-hidden="true"></canvas>
    <div id="snd-thumb"></div>
    <div id="snd-readout" aria-hidden="true"></div>
  </div>

  <div id="lens-panel" role="group" aria-label="Lenses" hidden>
    <div class="lens-head">
      <span>THE LENS</span>
      <button id="lens-clear" type="button" hidden>CLEAR</button>
    </div>
    <div id="lens-groups"></div>
  </div>

  <div id="cartouche" hidden>
    <div id="cart-1">THE HOROLOGICAL ATLAS</div>
    <div id="cart-2"></div>
  </div>

  <div id="lightbox" role="dialog" aria-modal="true" aria-label="Image viewer" hidden>
    <button id="lb-close" type="button" aria-label="Close">
      <svg width="10" height="10" viewBox="0 0 10 10" aria-hidden="true">
        <path d="M0.5 0.5 L9.5 9.5 M9.5 0.5 L0.5 9.5" stroke="currentColor" stroke-width="1" fill="none"/>
      </svg>
    </button>
    <button id="lb-prev" type="button" aria-label="Previous image" hidden>
      <svg width="10" height="16" viewBox="0 0 10 16" aria-hidden="true">
        <path d="M8.5 1 L2 8 L8.5 15" stroke="currentColor" stroke-width="1.25" fill="none"/>
      </svg>
    </button>
    <img id="lb-img" alt="">
    <button id="lb-next" type="button" aria-label="Next image" hidden>
      <svg width="10" height="16" viewBox="0 0 10 16" aria-hidden="true">
        <path d="M1.5 1 L8 8 L1.5 15" stroke="currentColor" stroke-width="1.25" fill="none"/>
      </svg>
    </button>
    <div id="lb-caption">
      <span id="lb-title"></span><span id="lb-credit"></span><span id="lb-count"></span>
    </div>
  </div>

  <div id="fam-preview" aria-hidden="true" hidden>
    <div id="fp-media"></div>
    <p id="fp-overline"></p>
    <h3 id="fp-name"></h3>
    <p id="fp-line"></p>
  </div>

  <div id="watch-preview" aria-hidden="true" hidden>
    <div id="wp-media"></div>
    <p id="wp-overline"></p>
    <h3 id="wp-name"></h3>
    <p id="wp-meta"></p>
  </div>

  <figure id="cousteau" aria-hidden="true" hidden>
    <blockquote>From birth, man carries the weight of gravity on his shoulders.
      He is bolted to earth. But man has only to sink beneath the surface
      and he is free.</blockquote>
    <figcaption>Jacques-Yves Cousteau</figcaption>
  </figure>

  <div id="live" aria-live="polite" class="vh"></div>

  <script type="module" src="js/main.js?v=16"></script>
</body>
</html>
